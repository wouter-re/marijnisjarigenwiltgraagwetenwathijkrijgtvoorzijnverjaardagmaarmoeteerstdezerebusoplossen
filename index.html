<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marijns Verjaardagsbeslisboom</title>

  <style>
    :root {
      --bg: #160f0a;
      --card: #fff7e8;
      --card-dark: #2a1810;
      --orange: #f47b20;
      --fire: #ffb000;
      --red: #b83a16;
      --brown: #4a2a18;
      --cream: #fff3d6;
      --muted: #8f7a68;
      --green: #1f8a43;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 176, 0, .18), transparent 25%),
        radial-gradient(circle at 80% 0%, rgba(244, 123, 32, .16), transparent 28%),
        linear-gradient(135deg, #120b07, #2b140b 45%, #160f0a);
      color: var(--cream);
      overflow-x: hidden;
    }

    header {
      position: relative;
      z-index: 2;
      padding: 26px 18px 12px;
      text-align: center;
    }

    .shopbar {
      display: inline-flex;
      gap: 14px;
      align-items: center;
      background: rgba(255, 247, 232, .95);
      color: #2a1810;
      padding: 12px 18px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-weight: 800;
      letter-spacing: .2px;
    }

    .flame-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ffcf33, #f47b20 55%, #b83a16);
      color: white;
      font-size: 21px;
    }

    h1 {
      margin: 28px auto 10px;
      max-width: 900px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 6px 0 rgba(0,0,0,.25);
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      color: #ffe2a6;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    .reset-btn {
      padding: 12px 18px;
      border-radius: 999px;
      background: #fff7e8;
      color: #2a1810;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .reset-btn:hover {
      transform: translateY(-1px);
    }

    .stage {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 20px 16px 80px;
      overflow: auto;
    }

    .zoom-shell {
      width: max-content;
      min-width: min(100%, 980px);
      margin: 0 auto;
      transform-origin: top center;
      transition: transform .75s cubic-bezier(.2, .8, .2, 1);
    }

    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      padding: 20px;
    }

    .node {
      width: min(92vw, 620px);
      background: linear-gradient(180deg, #fff9ed, #f7e2bd);
      color: #24140d;
      border-radius: 26px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 3px solid rgba(255, 176, 0, .65);
      position: relative;
      animation: pop .45s ease both;
    }

    .node::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 32px;
      background: linear-gradient(120deg, rgba(255,176,0,.35), transparent, rgba(244,123,32,.28));
      z-index: -1;
      filter: blur(12px);
    }

    @keyframes pop {
      from {
        transform: translateY(18px) scale(.96);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .node-label {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      background: #2a1810;
      color: #ffd36b;
      font-size: .82rem;
      margin-bottom: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .question {
      margin: 0 0 10px;
      font-size: clamp(1.25rem, 3.5vw, 2rem);
      line-height: 1.12;
    }

    .small {
      color: #6f5845;
      line-height: 1.45;
      margin: 0;
    }

    .options {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      margin-top: 22px;
    }

    .option {
      min-width: 190px;
      max-width: 260px;
      padding: 16px 18px;
      border-radius: 18px;
      background: #fff7e8;
      color: #2a1810;
      border: 2px solid rgba(42,24,16,.12);
      box-shadow: 0 10px 24px rgba(0,0,0,.16);
      transition: .25s ease;
      text-align: left;
    }

    .option:hover {
      transform: translateY(-4px) rotate(-.5deg);
      border-color: var(--orange);
      box-shadow: 0 16px 30px rgba(0,0,0,.24);
    }

    .option-title {
      display: block;
      font-size: 1.03rem;
      margin-bottom: 4px;
    }

    .option-sub {
      display: block;
      color: #7a6553;
      font-weight: 600;
      font-size: .88rem;
      line-height: 1.3;
    }

    .option.chosen {
      background: linear-gradient(180deg, #ffcb4d, #f47b20);
      color: #21120a;
      border-color: #fff2b8;
    }

    .option.chosen .option-sub {
      color: #3d220f;
    }

    .option.ghost {
      opacity: .45;
      filter: grayscale(.25);
    }

    .option.readonly {
      cursor: default;
    }

    .connector {
      width: 4px;
      height: 36px;
      background: linear-gradient(#ffcb4d, #f47b20);
      border-radius: 99px;
      box-shadow: 0 0 18px rgba(255,176,0,.75);
    }

    .ending {
      background: linear-gradient(180deg, #2f1a10, #140b07);
      color: #fff3d6;
      border-color: #ffb000;
      text-align: center;
    }

    .ending .small {
      color: #ffdca1;
    }

    .gift {
      margin-top: 18px;
      padding: 18px;
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .floating-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .flyer {
      position: absolute;
      left: -180px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,247,232,.9);
      color: #1f130c;
      font-weight: 900;
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
      animation-name: fly;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      white-space: nowrap;
    }

    .flyer.ai {
      background: rgba(255,255,255,.92);
    }

    .flyer.fun {
      background: rgba(255, 201, 77, .9);
    }

    @keyframes fly {
      from {
        transform: translateX(-220px) translateY(0) rotate(0deg);
      }
      to {
        transform: translateX(calc(100vw + 420px)) translateY(var(--wave)) rotate(var(--spin));
      }
    }

    .firepit {
      width: 210px;
      height: 95px;
      margin: 32px auto 0;
      position: relative;
      opacity: .95;
    }

    .bowl {
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 48px;
      background: linear-gradient(180deg, #5a3320, #1e1009);
      border-radius: 0 0 110px 110px;
      border: 4px solid #8d4b25;
    }

    .flames {
      position: absolute;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .flame {
      width: 30px;
      height: 58px;
      background: linear-gradient(180deg, #fff7a8, #ffb000 45%, #f05a24 80%);
      border-radius: 50% 50% 45% 45%;
      transform-origin: bottom center;
      animation: flicker .7s infinite alternate ease-in-out;
    }

    .flame:nth-child(2) {
      height: 78px;
      width: 38px;
      animation-delay: .15s;
    }

    .flame:nth-child(3) {
      animation-delay: .3s;
    }

    @keyframes flicker {
      from {
        transform: scaleY(.9) rotate(-4deg);
      }
      to {
        transform: scaleY(1.08) rotate(5deg);
      }
    }

    @media (max-width: 720px) {
      .zoom-shell {
        transform: none !important;
        width: 100%;
      }

      .tree {
        padding: 10px 0;
      }

      .node {
        width: 94vw;
      }

      .option {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <div class="floating-layer" id="floatingLayer"></div>

  <header>
    <div class="shopbar">
      <span class="flame-logo">🔥</span>
      <span>Vuurkorf Winkel Cadeaukeuzehulp</span>
    </div>

    <h1>Marijns Verjaardags-spel</h1>

    <p class="subtitle">
      Welkom bij de meest onnodig uitgebreide beslisboom van Nederland.
      Kies steeds één richting. Elke keuze onthult een nieuwe laag.
    </p>

    <div class="firepit" aria-hidden="true">
      <div class="flames">
        <div class="flame"></div>
        <div class="flame"></div>
        <div class="flame"></div>
      </div>
      <div class="bowl"></div>
    </div>

    <div class="controls">
      <button class="reset-btn" onclick="resetTree()">Begin opnieuw</button>
    </div>
  </header>

  <main class="stage">
    <div class="zoom-shell" id="zoomShell">
      <div class="tree" id="tree"></div>
    </div>
  </main>

  <script>
    /*
      HIER PAS JE DE BESLISBOOM AAN.

      Elke vraag heeft:
      - id
      - label
      - question
      - text
      - options

      Elke optie heeft:
      - title
      - sub
      - next: id van de volgende vraag

      Een einde heeft:
      - ending: true
      - gift
    */

    const decisionTree = {
      start: {
        id: "start",
        label: "Start",
        question: "Marijn, wat is je huidige verjaardagstoestand?",
        text: "Kies eerlijk. De vuurkorf der waarheid kijkt mee.",
        options: [
          {
            title: "Ik ben klaar voor avontuur",
            sub: "Licht chaotisch, maar moedig.",
            next: "avontuur"
          },
          {
            title: "Ik wil vooral chillen",
            sub: "Warmte, rust en geen moeilijke vragen.",
            next: "chillen"
          },
          {
            title: "Ik vertrouw dit niet",
            sub: "Gezonde achterdocht.",
            next: "wantrouwen"
          }
        ]
      },

      avontuur: {
        id: "avontuur",
        label: "Laag 2",
        question: "Welke vorm van avontuur past bij jou?",
        text: "De pingpongballetjes vliegen al zenuwachtig door het beeld.",
        options: [
          {
            title: "Sportief avontuur",
            sub: "Zweten, slaan, winnen.",
            next: "sportief"
          },
          {
            title: "Italiaans avontuur",
            sub: "Zon, eten, gebaren.",
            next: "italie"
          }
        ]
      },

      chillen: {
        id: "chillen",
        label: "Laag 2",
        question: "Hoe wil je chillen?",
        text: "Denk goed na. Dit kan je verjaardag maken of breken.",
        options: [
          {
            title: "Bij een vuurtje",
            sub: "Sfeervol, warm, licht rokerig.",
            next: "vuur"
          },
          {
            title: "Met AI-hulp",
            sub: "Omdat zelf nadenken overschat is.",
            next: "ai"
          }
        ]
      },

      wantrouwen: {
        id: "wantrouwen",
        label: "Laag 2",
        question: "Waarom vertrouw je dit niet?",
        text: "Terecht misschien. Maar je moet toch kiezen.",
        options: [
          {
            title: "Te veel vliegende logo's",
            sub: "Gemini, ChatGPT, Claude, Copilot... verdacht.",
            next: "ai"
          },
          {
            title: "Te veel moeite voor een cadeau",
            sub: "Dat klinkt als Wouter.",
            next: "cadeau"
          }
        ]
      },

      sportief: {
        id: "sportief",
        label: "Laag 3",
        question: "Pingpongvraag: hoe speel jij?",
        text: "De tafel is denkbeeldig, maar de eer is echt.",
        options: [
          {
            title: "Aanvallend",
            sub: "Hard slaan, weinig nadenken.",
            next: "einde_pingpong"
          },
          {
            title: "Tactisch",
            sub: "Spin, plaatsing, irritant goed.",
            next: "einde_tactiek"
          }
        ]
      },

      italie: {
        id: "italie",
        label: "Laag 3",
        question: "Wat hoort het meest bij Italië?",
        text: "De vlag wappert. De zonnebrand staat klaar.",
        options: [
          {
            title: "Pasta en zon",
            sub: "Klassiek. Sterk. Veilig.",
            next: "einde_italie"
          },
          {
            title: "Espresso en chaos",
            sub: "Kort, krachtig, licht paniekerig.",
            next: "einde_espresso"
          }
        ]
      },

      vuur: {
        id: "vuur",
        label: "Laag 3",
        question: "Wat doe je bij het vuur?",
        text: "Dit is een serieuze karaktertest.",
        options: [
          {
            title: "Staren naar vlammen",
            sub: "Oeroud menselijk gedrag.",
            next: "einde_vuur"
          },
          {
            title: "Marshmallows roosteren",
            sub: "Kleverig maar feestelijk.",
            next: "einde_marshmallow"
          }
        ]
      },

      ai: {
        id: "ai",
        label: "Laag 3",
        question: "Welke AI mag jou helpen?",
        text: "Alle antwoorden zijn fout, behalve misschien één.",
        options: [
          {
            title: "ChatGPT",
            sub: "Verdacht behulpzaam.",
            next: "einde_chatgpt"
          },
          {
            title: "Gemini / Claude / Copilot",
            sub: "De rest van de vliegende bende.",
            next: "einde_ai_mix"
          }
        ]
      },

      cadeau: {
        id: "cadeau",
        label: "Laag 3",
        question: "Wil je nu eindelijk richting het cadeau?",
        text: "Er is geen weg terug. Behalve de resetknop.",
        options: [
          {
            title: "Ja, kom maar door",
            sub: "Eindelijk verstandig.",
            next: "einde_cadeau"
          },
          {
            title: "Nee, nog meer onzin",
            sub: "Respect.",
            next: "einde_onzin"
          }
        ]
      },

      einde_pingpong: {
        id: "einde_pingpong",
        label: "Einde",
        question: "Je bent de Pingpongpyromaan.",
        text: "Je cadeau moet iets zijn met snelheid, vuur en twijfelachtige techniek.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: pingpong + verjaardagsglorie."
      },

      einde_tactiek: {
        id: "einde_tactiek",
        label: "Einde",
        question: "Je bent de Strategische Spinmeester.",
        text: "Je wint niet door kracht, maar door iedereen gek te maken.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: iets slims, iets sportiefs, iets irritant goeds."
      },

      einde_italie: {
        id: "einde_italie",
        label: "Einde",
        question: "Je bent officieel vakantiegeschikt.",
        text: "Zonnebrand, Italiaanse vlag en een bord pasta: meer heeft een mens niet nodig.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: la dolce verjaardag."
      },

      einde_espresso: {
        id: "einde_espresso",
        label: "Einde",
        question: "Je bent een dubbele espresso in mensvorm.",
        text: "Klein beetje chaos, veel energie, perfecte verjaardagssfeer.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: iets Italiaans met turbo."
      },

      einde_vuur: {
        id: "einde_vuur",
        label: "Einde",
        question: "Je bent de Vlammenstaarder.",
        text: "Jij begrijpt dat een goed vuur eigenlijk al entertainment genoeg is.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: warm, sfeervol en licht mysterieus."
      },

      einde_marshmallow: {
        id: "einde_marshmallow",
        label: "Einde",
        question: "Je bent de Marshmallowmanager.",
        text: "Niet alles hoeft nuttig te zijn. Soms moet het gewoon plakken.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: zoet, gezellig en waarschijnlijk brandbaar."
      },

      einde_chatgpt: {
        id: "einde_chatgpt",
        label: "Einde",
        question: "Je koos ChatGPT. Interessante keuze.",
        text: "Deze website keurt dat goed. Volledig objectief natuurlijk.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: AI-goedgekeurde verjaardag."
      },

      einde_ai_mix: {
        id: "einde_ai_mix",
        label: "Einde",
        question: "Je hebt de AI-logo-storm overleefd.",
        text: "Gemini, Claude en Copilot vliegen nog steeds ergens rond.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: technologisch verantwoord feestgedoe."
      },

      einde_cadeau: {
        id: "einde_cadeau",
        label: "Einde",
        question: "Eindelijk. De cadeau-route.",
        text: "Je hebt geduld getoond. Of in elk geval genoeg geklikt.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: HIER KUN JE HET ECHTE CADEAU INVULLEN."
      },

      einde_onzin: {
        id: "einde_onzin",
        label: "Einde",
        question: "Je koos voor meer onzin.",
        text: "Dat is eigenlijk de meest Marijn-waardige keuze.",
        ending: true,
        gift: "🎁 Cadeau-uitkomst: bonuspunten voor koppigheid."
      }
    };

    let path = [];

    const treeEl = document.getElementById("tree");
    const zoomShell = document.getElementById("zoomShell");

    function renderTree() {
      treeEl.innerHTML = "";

      const startNode = decisionTree.start;
      renderNode(startNode, 0);

      const zoom = Math.max(0.58, 1 - path.length * 0.08);
      zoomShell.style.transform = `scale(${zoom})`;
    }

    function renderNode(node, depth) {
      const nodeEl = document.createElement("section");
      nodeEl.className = "node" + (node.ending ? " ending" : "");

      nodeEl.innerHTML = `
        <span class="node-label">${node.label}</span>
        <h2 class="question">${node.question}</h2>
        <p class="small">${node.text}</p>
        ${node.ending ? `<div class="gift">${node.gift}</div>` : ""}
      `;

      treeEl.appendChild(nodeEl);

      if (node.ending) return;

      const chosenForThisNode = path.find(step => step.nodeId === node.id);

      const optionsEl = document.createElement("div");
      optionsEl.className = "options";

      node.options.forEach(option => {
        const btn = document.createElement("button");
        const isChosen = chosenForThisNode && chosenForThisNode.next === option.next;
        const isPast = Boolean(chosenForThisNode);

        btn.className = "option";
        if (isPast) btn.classList.add("readonly");
        if (isChosen) btn.classList.add("chosen");
        if (isPast && !isChosen) btn.classList.add("ghost");

        btn.innerHTML = `
          <span class="option-title">${option.title}</span>
          <span class="option-sub">${option.sub}</span>
        `;

        if (!isPast) {
          btn.onclick = () => chooseOption(node.id, option.next);
        }

        optionsEl.appendChild(btn);
      });

      treeEl.appendChild(optionsEl);

      if (chosenForThisNode) {
        const connector = document.createElement("div");
        connector.className = "connector";
        treeEl.appendChild(connector);

        const nextNode = decisionTree[chosenForThisNode.next];
        renderNode(nextNode, depth + 1);
      }
    }

    function chooseOption(nodeId, next) {
      path.push({ nodeId, next });
      renderTree();

      setTimeout(() => {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth"
        });
      }, 150);
    }

    function resetTree() {
      path = [];
      renderTree();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function createFloatingObjects() {
      const layer = document.getElementById("floatingLayer");

      const items = [
        "Gemini", "ChatGPT", "Claude", "Copilot",
        "🏓 batje", "🏓 balletje", "☀️ zonnebrand", "🇮🇹 Italia",
        "🔥 vuurkorf", "🏓 smash", "☀️ SPF 50", "🇮🇹 pasta"
      ];

      for (let i = 0; i < 26; i++) {
        const el = document.createElement("div");
        const item = items[i % items.length];

        el.className = "flyer " + (item.includes("GPT") || item.includes("Gemini") || item.includes("Claude") || item.includes("Copilot") ? "ai" : "fun");
        el.textContent = item;

        el.style.top = Math.random() * 92 + "vh";
        el.style.animationDuration = 15 + Math.random() * 22 + "s";
        el.style.animationDelay = -Math.random() * 30 + "s";
        el.style.setProperty("--wave", (Math.random() * 220 - 110) + "px");
        el.style.setProperty("--spin", (Math.random() > .5 ? 360 : -360) + "deg");
        el.style.fontSize = 13 + Math.random() * 13 + "px";

        layer.appendChild(el);
      }
    }

    createFloatingObjects();
    renderTree();
  </script>
</body>
</html>
